{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">📊 Admin Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow border-0 text-center">
                <div class="card-body">
                    <h5>Total Users</h5>
                    <h2>{{ total_users }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 text-center">
                <div class="card-body">
                    <h5>Total Cars</h5>
                    <h2>{{ total_cars }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 text-center">
                <div class="card-body">
                    <h5>Total Bookings</h5>
                    <h2>{{ total_bookings }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 text-center">
                <div class="card-body">
                    <h5>Active Trips</h5>
                    <h2>{{ active_trips }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 text-center">
                <div class="card-body">
                    <h5>Total Revenue</h5>
                    <h2>₹{{ total_revenue }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 text-center">
                <div class="card-body">
                    <h5>Pending Refunds</h5>
                    <h2>₹{{ pending_refunds }}</h2>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
