{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <h2>Contact Us</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input
                type="text"
                name="name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input
                type="email"
                name="email"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Message</label>
            <textarea
                name="message"
                class="form-control"
                rows="5"
                required></textarea>
        </div>

        <button
            type="submit"
            class="btn btn-primary">
            Send Message
        </button>

    </form>

</div>

{% endblock %}
