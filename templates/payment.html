{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">
                {{ payment_title }}
            </h2>

            <p>
                <strong>Car:</strong>
                {{ booking.car.brand }}
                {{ booking.car.model }}
            </p>

            <p>
                <strong>Amount:</strong>
                ₹{{ display_amount }}
            </p>

            <div class="alert alert-warning text-center">

                <strong>⏳ Complete your payment within</strong>

                <h3 id="countdown" class="mt-2 text-danger"></h3>

            </div>

            <button
                id="rzp-button"
                class="btn btn-success">

                💳 Pay ₹{{ display_amount }}

            </button>

        </div>

    </div>

</div>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

var options = {

    "key": "{{ razorpay_key }}",

    "amount": "{{ payment.amount }}",

    "currency": "INR",

    "name": "Car Rental Platform",

    "description": "Booking Payment",

    "order_id": "{{ payment.id }}",

    "handler": function (response) {

        window.location.href =
        "/payment-success/?payment_id=" +
        response.razorpay_payment_id +
        "&order_id=" +
        response.razorpay_order_id +
        "&signature=" +
        response.razorpay_signature;

    },

    "theme": {

        "color": "#0d6efd"

    }

};

var rzp = new Razorpay(options);

document.getElementById("rzp-button").onclick = function(e){

    rzp.open();

    e.preventDefault();

}

const bookedAt = new Date("{{ booking.booked_at|date:'c' }}").getTime();

const expiryTime = bookedAt + (15 * 60 * 1000);

const countdown = document.getElementById("countdown");

const timer = setInterval(function () {

    const now = new Date().getTime();

    const distance = expiryTime - now;

    if (distance <= 0) {

        clearInterval(timer);

        countdown.innerHTML = "Payment Expired";

        alert("Your payment session has expired.");

        window.location.href = "{% url 'my_bookings' %}";

        return;

    }

    const minutes = Math.floor(distance / (1000 * 60));

    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    countdown.innerHTML =
        String(minutes).padStart(2, "0")
        + ":"
        + String(seconds).padStart(2, "0");

}, 1000);

</script>

{% endblock %}
